<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница 4</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #e8f5e9; /* Светло-зеленый фон для отличия */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .content-box {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 { color: #2e7d32; margin-top: 0; }
        p { color: #555; line-height: 1.6; }
        .nav-links {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn {
            display: block;
            padding: 10px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-primary {
            background-color: #2e7d32;
            color: white;
        }
        .btn-primary:hover { background-color: #1b5e20; }
        .btn-secondary {
            background-color: #f5f5f5;
            color: #333;
            border: 1px solid #ddd;
        }
        .btn-secondary:hover { background-color: #e0e0e0; }
    </style>
</head>
<body>

    <div class="content-box">
        <h1>Страница 4 (page4.html)</h1>
        <p>Это новая страница, добавленная в структуру сайта.</p>
        <p>Здесь может располагаться дополнительная информация, контакты или новости.</p>
        
        <div class="nav-links">
            <a href="register.html" class="btn btn-primary">Перейти к регистрации</a>
            <a href="index.html" class="btn btn-secondary">← На главную</a>
        </div>
    </div>

</body>
</html>
